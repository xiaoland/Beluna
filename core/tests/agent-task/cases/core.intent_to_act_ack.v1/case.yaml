{
  "schema_version": 0,
  "id": "core.intent_to_act_ack.v1",
  "title": "User intent is converted into an acknowledged act",
  "task": {
    "user_intent": "Record an audit note with the exact message: hello beluna",
    "success_claim": "Core turns the user intent into one acknowledged audit act.",
    "injected_sense": {
      "endpoint_id": "test.user",
      "neural_signal_descriptor_id": "user.intent",
      "payload": "Record an audit note with the exact message: hello beluna",
      "weight": 1.0
    }
  },
  "world": {
    "root": "$CASE_TMP/world",
    "files": [],
    "env": {},
    "endpoints": [
      {
        "id": "audit",
        "kind": "ack_recording_endpoint",
        "descriptors": [
          {
            "type": "act",
            "neural_signal_descriptor_id": "task.audit.record",
            "payload_schema": {
              "type": "object",
              "required": ["message"],
              "properties": {
                "message": { "type": "string" }
              }
            }
          }
        ],
        "response": {
          "outcome": "acknowledged",
          "reference_id_template": "ack:{act_instance_id}"
        }
      }
    ],
    "continuity": {
      "initial_state": "default"
    },
    "proprioception": {
      "entries": {}
    }
  },
  "ai": {
    "mode": "replay",
    "provider": "aimock",
    "model": "fixture-model",
    "fixtures": {
      "root": "fixtures"
    }
  },
  "runtime": {
    "harness": "in_process",
    "tick_source": "manual",
    "max_ticks": 2,
    "max_primary_turns": 4,
    "max_model_calls": 8,
    "max_acts": 1,
    "timeout_ms": 10000,
    "exercised_path": ["afferent", "cortex", "efferent", "spine", "endpoint"]
  },
  "oracle": {
    "pass": {
      "evidence": [
        {
          "stream": "sense.injected",
          "match": {
            "endpoint_id": "test.user",
            "neural_signal_descriptor_id": "user.intent"
          }
        },
        {
          "stream": "act.received",
          "exact_count": 1,
          "match": {
            "endpoint_id": "audit",
            "neural_signal_descriptor_id": "task.audit.record",
            "payload": {
              "message": "hello beluna"
            }
          }
        },
        {
          "stream": "dispatch.outcome",
          "match": {
            "endpoint_id": "audit",
            "neural_signal_descriptor_id": "task.audit.record",
            "outcome": "acknowledged",
            "reference_id_prefix": "ack:"
          }
        }
      ],
      "correlation": {
        "require_act_instance_id": true,
        "require_tick": true
      }
    },
    "fail": {
      "forbidden": {
        "endpoints": ["shell", "web"],
        "max_unacknowledged_acts": 0,
        "dispatch_outcomes": ["rejected", "lost"]
      }
    }
  },
  "metrics": {
    "collect": ["wall_time_ms", "tick_count", "model_call_count", "act_count", "acknowledged_act_count"]
  },
  "artifacts": {
    "write": ["result.json", "evidence.jsonl"]
  }
}
