enabled = true

[[skills.config]]
name = "build-ios-apps:swiftui-performance-audit"
enabled = true

[[skills.config]]
name = "build-ios-apps:swiftui-ui-patterns"
enabled = true

[[skills.config]]
name = "build-ios-apps:swiftui-view-refactor"
enabled = true

[[skills.config]]
name = "github:gh-fix-ci"
enabled = true

[[skills.config]]
name = "github:github"
enabled = true

[[skills.config]]
name = "github:yeet"
enabled = true
